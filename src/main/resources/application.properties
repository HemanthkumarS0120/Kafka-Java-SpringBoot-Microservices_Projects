spring.application.name=kafka-project

# Kafka Server is running on 9092 (Kafka Broker service)
spring.kafka.consumer.bootstrap-servers[0]=localhost:9092
#Configuring the consumer group
# Consumer group ID - consumers in same group share the load
spring.kafka.consumer.group-id=myGroup
# earliest = read from beginning if no offset found
# latest  = read only new messages
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
#spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

#JsonDeserializer (convert Json Byte array into Java Object )
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Configuring Kafka producer (Both producer and consumer running on the same server port)
spring.kafka.producer.bootstrap-servers[0]=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
#spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

#Jsonserializer (convert Java Object  into Json Byte array  )
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer




# Topics defining in properties instead of hardcoding in the code
spring.kafka.topic.name=Kafkaproject
spring.kafka.topic-json.name=Kafkaproject_Json